<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="container">
    <h1>🌤 Weather Dashboard</h1>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
    </div>
    <div id="errorMsg" class="error hidden"></div>
    <div id="loader" class="loader hidden">Fetching weather...</div>
    <div id="weatherCard" class="weather-card hidden">
      <div class="city-name" id="cityName"></div>
      <div class="country" id="country"></div>
      <div class="temp" id="temperature"></div>
      <div class="description" id="description"></div>
      <div class="details">
        <div class="detail-item"><span>Humidity</span><strong id="humidity"></strong></div>
        <div class="detail-item"><span>Wind</span><strong id="windSpeed"></strong></div>
        <div class="detail-item"><span>Feels Like</span><strong id="feelsLike"></strong></div>
        <div class="detail-item"><span>Visibility</span><strong id="visibility"></strong></div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
